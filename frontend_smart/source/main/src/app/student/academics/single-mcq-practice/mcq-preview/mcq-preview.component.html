<div class="question-list" *ngIf="questions && questions.length > 0">
  <div *ngFor="let q of questions; let i = index" class="question-card-modern p-3 mb-3"
    [ngClass]="{'card-correct': isCorrect(q), 'card-wrong': !isCorrect(q)}">
    <div class="d-flex justify-content-between">
      <!-- Main Content -->
      <div class="w-100">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3 gap-2">
          <div class="fw-bold text-muted" style="font-size: 14px;">
            Question {{ i + 1 }}
          </div>
          <div class="d-flex flex-wrap align-items-center gap-2 text-muted" style="font-size: 13px;">
            <span class="q-badge-grey m-0">{{ (q.difficulty | titlecase) || 'Easy' }}</span>
            <span class="fw-medium text-dark bg-light px-2 py-1 rounded border">{{ q.marks || 1 }}M</span>
          </div>
        </div>
        
        <div class="fw-semibold q-text-dark mb-3" style="font-size: 18px; line-height: 1.6;">
          {{ q.question_text }}
        </div>

        <hr class="q-separator my-2">

        <!-- MCQ Options Display -->
        <div class="row g-2 mb-2 ps-2">
          <ng-container *ngIf="q.type === 'MCQ_SINGLE'">
            <mat-radio-group [(ngModel)]="studentAnswers[q.id]" [disabled]="true" class="row w-100 m-0">
              <div class="col-md-6" *ngFor="let opt of q.answer_config.options; let idx = index">
                <div class="d-flex align-items-center mb-1 option-wrapper">
                  <mat-radio-button [value]="idx" [disableRipple]="true" class="q-text-option flex-grow-1" [ngClass]="{
                                      'text-success fw-bold': q.answer_config?.correct_answer === idx,
                                      'text-danger fw-bold': studentAnswers[q.id] === idx && q.answer_config?.correct_answer !== idx
                                    }">
                    {{ opt }}
                  </mat-radio-button>
                </div>
              </div>
            </mat-radio-group>
          </ng-container>

          <ng-container *ngIf="q.type === 'MCQ_MULTI'">
            <div class="col-md-6" *ngFor="let opt of q.answer_config.options; let idx = index">
              <div class="d-flex align-items-center mb-1 option-wrapper">
                <mat-checkbox [checked]="studentAnswers[q.id]?.includes(idx)" [disabled]="true" [disableRipple]="true"
                  class="q-text-option flex-grow-1" [ngClass]="{
                                'text-success fw-bold': q.answer_config?.correct_answers?.includes(idx),
                                'text-danger fw-bold': studentAnswers[q.id]?.includes(idx) && !q.answer_config?.correct_answers?.includes(idx)
                              }">
                  {{ opt }}
                </mat-checkbox>
              </div>
            </div>
          </ng-container>
        </div>

        <!-- Explanation -->
        <!-- <div class="mb-2 ps-2 mt-2 p-2 bg-light rounded" *ngIf="q.answer_config?.explanation">
          <strong class="text-primary"><mat-icon class="align-middle me-1" style="font-size: 18px; width: 18px; height: 18px;">lightbulb</mat-icon>Explanation:</strong><br />
          <span class="text-muted" style="white-space: pre-wrap; font-size: 14px;">{{ q.answer_config.explanation }}</span>
        </div> -->

        <!-- Result Message -->
        <div class="result-message mt-2 ps-2 d-flex justify-content-between align-items-center flex-wrap">
          <div>
            <span class="text-success fw-bold d-flex align-items-center" *ngIf="isCorrect(q)">
              <mat-icon class="me-2">check_circle</mat-icon> Correct!
            </span>
            <span class="text-danger fw-bold d-flex align-items-center" *ngIf="!isCorrect(q)">
              <mat-icon class="me-2">cancel</mat-icon> Incorrect.
            </span>
          </div>
          <div class="text-end" *ngIf="!isCorrect(q)">
            <span class="text-success fw-bold d-flex align-items-center" style="font-size: 14px;">
              Ans: {{ getCorrectAnswerText(q) }}
            </span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
