<app-widget-skeleton *ngIf="state === 'loading'" type="list" style="height: 350px; display: block; border-radius: 20px; overflow: hidden;"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex align-items-center">
    <div class="rounded-circle bg-light-info text-teal d-flex align-items-center justify-content-center me-2"
      style="width: 24px; height: 24px;">
      <i class="fas fa-calendar-check font-10"></i>
    </div>
    <h6 class="font-weight-bold mb-0 text-body font-13">Attendance</h6>
  </div>
  <div class="card-body p-3 text-center d-flex flex-column justify-content-center">
    <div style="height: 140px;" class="d-flex justify-content-center align-items-center">
      <apx-chart *ngIf="attendance" [series]="attendanceChartOptions.series!"
        [chart]="attendanceChartOptions.chart!" [plotOptions]="attendanceChartOptions.plotOptions!"
        [labels]="attendanceChartOptions.labels!" [colors]="attendanceChartOptions.colors!">
      </apx-chart>
      <div *ngIf="!attendance" class="text-muted font-11">No data</div>
    </div>
    <div class="d-flex justify-content-around w-100 border-top pt-3 mt-auto">
      <div class="text-center lh-sm">
        <h6 class="font-weight-bold text-body mb-1 font-13">{{ attendance?.present || 0 }}</h6>
        <span class="font-9 text-muted fw-bold d-flex align-items-center justify-content-center"><i
            class="fas fa-circle text-success font-6 me-1"></i>Present</span>
      </div>
      <div class="text-center lh-sm border-start border-end px-3">
        <h6 class="font-weight-bold text-body mb-1 font-13">{{ attendance?.late || 0 }}</h6>
        <span class="font-9 text-muted fw-bold d-flex align-items-center justify-content-center"><i
            class="fas fa-circle text-warning font-6 me-1"></i>Late</span>
      </div>
      <div class="text-center lh-sm">
        <h6 class="font-weight-bold text-body mb-1 font-13">{{ attendance?.absent || 0 }}</h6>
        <span class="font-9 text-muted fw-bold d-flex align-items-center justify-content-center"><i
            class="fas fa-circle text-danger font-6 me-1"></i>Absent</span>
      </div>
    </div>
  </div>
</div>
