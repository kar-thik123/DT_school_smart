<app-widget-skeleton *ngIf="state === 'loading'" type="list"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <div class="rounded-circle bg-light-danger text-danger d-flex align-items-center justify-content-center me-2" style="width: 24px; height: 24px;">
         <i class="fas fa-heart font-10"></i>
      </div>
      <h6 class="font-weight-bold mb-0 text-body font-13">My Favorites</h6>
    </div>
    <a href="javascript:void(0)" *ngIf="favoriteSubjects.length > 3" class="text-primary font-10 fw-bold text-decoration-none" (click)="toggleFavoriteSubjects()">
      <span *ngIf="!showAllFavoriteSubjects">View All &rarr;</span>
      <span *ngIf="showAllFavoriteSubjects">&larr; View Less</span>
    </a>
  </div>
  <div class="card-body p-3 p-xl-4 pt-3 d-flex flex-column">
    <!-- Favorite Colour Banner -->
    <div class="mb-3">
      <h6 class="font-11 text-muted text-uppercase fw-bold mb-2">Color</h6>
      <div *ngIf="favoriteColour" class="d-flex align-items-center p-2 border rounded-3 bg-body shadow-sm" [style.borderLeft]="'4px solid ' + favoriteColour">
        <div class="rounded-circle shadow-sm me-3 border" style="width: 24px; height: 24px;" [style.backgroundColor]="favoriteColour"></div>
        <span class="font-weight-bold text-body font-12 text-capitalize">{{ favoriteColour }}</span>
      </div>
      <div *ngIf="!favoriteColour" class="text-muted font-11">
        <i class="fas fa-palette me-1 opacity-50"></i> No favorite colour set.
      </div>
    </div>

    <!-- Favorite Subjects List -->
    <div>
      <h6 class="font-11 text-muted text-uppercase fw-bold mb-2">Subjects</h6>
      <div *ngIf="favoriteSubjects.length === 0" class="text-center w-100 py-3">
        <span class="text-muted font-11"><i class="fas fa-book me-1 opacity-50"></i> No favorite subjects yet.</span>
      </div>
      
      <div class="d-flex flex-column gap-2" *ngIf="favoriteSubjects.length > 0">
        <div class="d-flex align-items-center p-2 border rounded-3 bg-body hover-shadow-sm transition-all" *ngFor="let subject of favoriteSubjects | slice:0:(showAllFavoriteSubjects ? favoriteSubjects.length : 3); let i = index">
          <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm text-white" 
               style="width: 32px; height: 32px; flex-shrink: 0;" 
               [style.background]="i === 0 ? 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)' : (i === 1 ? 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)' : 'linear-gradient(135deg, #a855f7 0%, #7e22ce 100%)')">
             <i class="fas fa-book-reader font-12"></i>
          </div>
          <div class="flex-grow-1 lh-sm overflow-hidden">
            <h6 class="font-weight-bold mb-1 text-body font-12 text-truncate" [title]="subject.subjectName">{{ subject.subjectName }}</h6>
            <span class="font-10 text-muted d-block text-truncate">Score: <span class="fw-bold" [ngClass]="subject.readiness >= 80 ? 'text-success' : (subject.readiness >= 60 ? 'text-info' : 'text-warning')">{{ subject.readiness }}%</span></span>
          </div>
          <button class="btn btn-sm btn-outline-primary rounded-pill font-10 px-2 py-0 fw-bold border-1 ms-1" style="height: 24px;" (click)="navigateToPractice(subject.subjectId, subject.subjectName, subject.nextNode)">Go</button>
        </div>
      </div>
    </div>
  </div>
</div>
