<app-widget-skeleton *ngIf="state === 'loading'" type="chart" style="height: 350px; display: block; border-radius: 20px; overflow: hidden;"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex align-items-center">
    <div
      class="rounded-circle bg-light-success text-success d-flex align-items-center justify-content-center me-2"
      style="width: 24px; height: 24px;">
      <i class="fas fa-chart-line font-10"></i>
    </div>
    <h6 class="font-weight-bold mb-0 text-body font-14">Academic Readiness Growth</h6>
  </div>
  <div class="card-body p-3 p-xl-4 pt-2">
    <div class="d-flex justify-content-between mb-2 text-center" style="max-width: 400px; margin: 0 auto;">
      <div>
        <span class="d-block font-10 text-muted fw-bold mb-1">Readiness</span>
        <h5 class="font-weight-bold text-success mb-0">{{ (kpis?.readyForExam || 0) | number:'1.0-1' }}%</h5>
      </div>
      <div>
        <span class="d-block font-10 text-muted fw-bold mb-1">Coverage</span>
        <h5 class="font-weight-bold text-info mb-0">{{ (kpis?.curriculumCoverage || 0) | number:'1.0-1' }}%
        </h5>
      </div>
      <div>
        <span class="d-block font-10 text-muted fw-bold mb-1">Accuracy</span>
        <h5 class="font-weight-bold text-purple mb-0">{{ (weeklyTrend.length > 0 ?
          weeklyTrend[weeklyTrend.length - 1].accuracy : 0) | number:'1.0-1' }}%</h5>
      </div>
    </div>
    <div *ngIf="weeklyTrend.length === 0" class="text-center p-3 bg-body-secondary rounded-3">
      <span class="font-11 text-muted">Not enough data.</span>
    </div>
    <div *ngIf="weeklyTrend.length > 0" class="w-100"
      style="height: 180px; overflow: hidden; margin: 0 -10px;">
      <apx-chart [series]="areaChartOptions.series!" [chart]="areaChartOptions.chart!"
        [xaxis]="areaChartOptions.xaxis!" [colors]="areaChartOptions.colors!"
        [stroke]="areaChartOptions.stroke!" [dataLabels]="areaChartOptions.dataLabels!">
      </apx-chart>
    </div>
  </div>
</div>
