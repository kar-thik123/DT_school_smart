<app-widget-skeleton *ngIf="state === 'loading'" type="list"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <div class="rounded-circle bg-light-warning text-warning d-flex align-items-center justify-content-center me-2" style="width: 24px; height: 24px;">
         <i class="fas fa-star font-10"></i>
      </div>
      <h6 class="font-weight-bold mb-0 text-body font-13">Skills Overview</h6>
    </div>
    <a href="javascript:void(0)" *ngIf="skills.length > 4" class="text-primary font-10 fw-bold text-decoration-none" (click)="toggleSkills()">
      <span *ngIf="!showAllSkills">View All &rarr;</span>
      <span *ngIf="showAllSkills">&larr; View Less</span>
    </a>
  </div>
  <div class="card-body p-3 p-xl-4 pt-3 d-flex flex-wrap justify-content-center text-center gap-2">

    <div *ngIf="skills.length === 0" class="text-center w-100 py-4">
      <span class="text-muted font-12"><i class="fas fa-star me-1 text-warning opacity-50"></i> No skills verified.</span>
    </div>

    <!-- Real Skills Loop -->
    <div class="d-flex flex-column align-items-center flex-grow-1"
      *ngFor="let s of skills | slice:0:(showAllSkills ? skills.length : 4); let i = index" [ngClass]="{'border-start ms-2 ps-2': i > 0 && (!showAllSkills || i % 4 !== 0), 'mt-3': showAllSkills && i >= 4}">
      <div class="rounded-circle d-flex align-items-center justify-content-center mb-2 shadow-sm"
        style="width: 48px; height: 48px;" [style.backgroundColor]="getSkillIcon(s.skill_type).bg"
        [style.color]="getSkillIcon(s.skill_type).color">
        <i [class]="getSkillIcon(s.skill_type).icon" class="font-20"></i>
      </div>
      <h6 class="font-weight-bold mb-1 font-12 text-body text-truncate" style="max-width: 100px;"
        [title]="s.skill_name">{{ s.skill_name }}</h6>
      <span class="badge rounded-pill"
        [ngClass]="s.status === 'approved' ? 'bg-light-success text-success border border-success' : (s.status === 'pending' ? 'bg-light-warning text-warning border border-warning' : 'bg-light-danger text-danger border border-danger')"
        style="font-size: 0.65rem; padding: 2px 6px;">{{ s.status === 'approved' ? 'Verified' : (s.status |
        titlecase) }}</span>
    </div>

  </div>
</div>
