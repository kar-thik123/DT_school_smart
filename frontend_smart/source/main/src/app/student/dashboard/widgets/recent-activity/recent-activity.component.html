<app-widget-skeleton *ngIf="state === 'loading'" type="list"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div
    class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex justify-content-between align-items-center">
    <h6 class="font-weight-bold mb-0 text-body font-13"><i class="fas fa-bolt me-2 text-warning"></i> Recent
      Activity</h6>
    <a href="javascript:void(0)" (click)="toggleActivities()"
      class="text-primary font-10 fw-bold text-decoration-none">
      <span *ngIf="!showAllActivities">View All &rarr;</span>
      <span *ngIf="showAllActivities">&larr; View Less</span>
    </a>
  </div>
  <div class="card-body p-3 p-xl-4 pt-3">
    <div *ngIf="groupedActivities.length === 0" class="text-center p-2 border rounded bg-body-secondary">
      <h6 class="text-muted mb-0 font-11">No recent activity</h6>
    </div>
    <div class="position-relative ms-2" *ngIf="groupedActivities.length > 0">
      <div class="position-absolute bg-body-secondary"
        style="width: 2px; height: calc(100% - 20px); left: 14px; top: 10px; z-index: 0;"></div>
      <div class="d-flex align-items-start mb-3 position-relative z-index-1"
        *ngFor="let act of groupedActivities | slice:0:(showAllActivities ? groupedActivities.length : 3)">
        <div
          class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0 bg-body shadow-sm border border-2 border-white"
          style="width: 30px; height: 30px;" [ngClass]="act.bg.replace('bg-light-', 'text-')">
          <i [class]="act.icon" class="font-10"></i>
        </div>
        <div class="flex-grow-1 lh-sm pt-1">
          <h6 class="font-weight-bold mb-1 text-body font-12">{{ act.title }}</h6>
          <small class="text-muted font-9 fw-bold text-uppercase tracking-wide">{{ act.time }}</small>
        </div>
      </div>
    </div>
  </div>
</div>
