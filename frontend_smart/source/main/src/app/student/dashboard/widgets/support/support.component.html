<app-widget-skeleton *ngIf="state === 'loading'" type="list"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex align-items-center">
    <div
      class="rounded-circle bg-light-primary text-primary d-flex align-items-center justify-content-center me-2"
      style="width: 24px; height: 24px;">
      <i class="fas fa-headset font-10"></i>
    </div>
    <h6 class="font-weight-bold mb-0 text-body font-13">Support</h6>
  </div>
  <div class="card-body p-3 p-xl-4 pt-3">
    <div class="d-flex flex-column gap-2">
      <div class="w-100" *ngFor="let t of teachers | slice:0:3">
        <div
          class="d-flex align-items-center justify-content-between p-2 px-3 border rounded-pill bg-body hover-shadow-sm transition-all">
          <div class="d-flex align-items-center">
            <ng-container *ngIf="t.profile_picture; else initialAvatar">
              <img [src]="t.profile_picture" alt="Teacher"
                class="rounded-circle me-3 shadow-sm border border-white"
                style="width: 32px; height: 32px; object-fit: cover;"
                onerror="this.src='assets/images/user/user1.jpg'">
            </ng-container>
            <ng-template #initialAvatar>
              <div
                class="rounded-circle text-white bg-primary bg-gradient d-flex align-items-center justify-content-center me-3 font-11 font-weight-bold shadow-sm"
                style="width: 32px; height: 32px;">
                {{ t.teacher_name ? t.teacher_name.charAt(0).toUpperCase() : 'T' }}
              </div>
            </ng-template>
            <div class="lh-sm">
              <span class="d-block font-12 font-weight-bold text-body text-truncate" style="max-width: 100px;"
                [title]="t.teacher_name">{{ t.teacher_name }}</span>
              <small class="text-success font-9 fw-bold d-flex align-items-center mt-1"><i
                  class="fas fa-circle font-6 me-1"></i> Online</small>
            </div>
          </div>
          <button
            class="btn btn-sm btn-outline-primary rounded-pill font-9 px-3 py-1 fw-bold border-1">Message</button>
        </div>
      </div>
      <div class="w-100" *ngIf="teachers.length === 0">
        <div class="text-center p-3 bg-body-secondary rounded-pill">
          <span class="font-11 text-muted">No assigned teacher.</span>
        </div>
      </div>
    </div>
  </div>
</div>
