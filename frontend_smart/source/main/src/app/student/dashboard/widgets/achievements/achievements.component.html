<app-widget-skeleton *ngIf="state === 'loading'" type="list"></app-widget-skeleton>

<div *ngIf="state === 'loaded'" class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
  <div
    class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex justify-content-between align-items-center">
    <h6 class="font-weight-bold mb-0 text-body font-13"><i class="fas fa-trophy me-2 text-warning"></i>
      Achievements</h6>
    <a href="javascript:void(0)" (click)="toggleAchievements()"
      class="text-primary font-10 fw-bold text-decoration-none">
      <span *ngIf="!showAllAchievements">View All &rarr;</span>
      <span *ngIf="showAllAchievements">&larr; View Less</span>
    </a>
  </div>
  <div class="card-body p-3 p-xl-4 pt-3">
    <div class="d-flex flex-column gap-2">
      <div class="badge bg-body border p-2 px-3 d-flex align-items-center w-100 transition-all"
        *ngFor="let ach of achievementsGrid | slice:0:(showAllAchievements ? achievementsGrid.length : 3)"
        [ngClass]="ach.locked ? 'border-body-secondary' : 'shadow-sm border-warning'">
        <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
          style="width: 28px; height: 28px;"
          [ngClass]="ach.locked ? 'bg-body-secondary' : 'bg-light-warning'">
          <i [class]="ach.icon" class="font-12"
            [ngClass]="ach.locked ? 'text-muted opacity-50' : ach.color"></i>
        </div>
        <div class="text-start flex-grow-1 lh-sm">
          <span class="d-block font-11 font-weight-bold text-body"
            [ngClass]="ach.locked ? 'opacity-75' : ''">{{ ach.title }}</span>
          <span class="font-9 text-muted">{{ ach.progress }}</span>
        </div>
        <i class="fas fa-check-circle text-success font-14 ms-2" *ngIf="!ach.locked"></i>
      </div>
    </div>
  </div>
</div>
