<section class="content">
  <div class="content-block">
    <div class="block-header" *ngFor="let breadscrum of breadscrums">
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active"></app-breadcrumb>
    </div>

    <!-- Error State -->
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center" role="alert" style="border-radius: 12px;">
      <i class="fas fa-exclamation-triangle me-3 font-24"></i>
      <div>
        <h5 class="alert-heading mb-1 font-weight-bold">Error loading dashboard</h5>
        <p class="mb-0">{{ error }}</p>
      </div>
    </div>

    <!-- Main Content Area (Widgets will handle their own loading states) -->
    <div *ngIf="!error" class="fade-in">
      
      <!-- Not Enrolled State -->
      <div class="alert alert-warning d-flex align-items-center shadow-sm mb-4" role="alert"
        *ngIf="notEnrolledInActiveYear" style="border-radius: 12px; border-left: 5px solid #f59e0b;">
        <i class="fas fa-info-circle me-3 font-24 text-warning"></i>
        <div>
          <h6 class="alert-heading mb-1 font-weight-bold text-body">Not Enrolled in Active Year</h6>
          <p class="mb-0 text-muted font-13">You are not currently enrolled in the active academic year ({{
            overview?.academic_year }}). Please contact your administrator.</p>
        </div>
      </div>

      <!-- Hero Banner -->
      <app-hero-banner *ngIf="!notEnrolledInActiveYear" class="d-block mb-4"></app-hero-banner>

      <!-- KPIs -->
      <app-kpis *ngIf="!notEnrolledInActiveYear" class="d-block"></app-kpis>

      <!-- Action Center -->
      <app-action-center *ngIf="!notEnrolledInActiveYear" class="d-block"></app-action-center>

      <!-- Subject Analytics -->
      <app-subject-analytics *ngIf="!notEnrolledInActiveYear" class="d-block"></app-subject-analytics>

      <!-- Weekly Trend & Attendance -->
      <div class="row g-3 mb-4" *ngIf="!notEnrolledInActiveYear">
        <div class="col-xl-8 col-lg-7">
          <app-weekly-trend class="d-block h-100"></app-weekly-trend>
        </div>
        <div class="col-xl-4 col-lg-5">
          <app-attendance class="d-block h-100"></app-attendance>
        </div>
      </div>

      <!-- Examination Analytics -->
      <app-examination-analytics *ngIf="!notEnrolledInActiveYear" class="d-block"></app-examination-analytics>

      <!-- Recent Activity, Achievements, Support -->
      <div class="row g-3 mb-4" *ngIf="!notEnrolledInActiveYear">
        <div class="col-xl-4 col-lg-4">
          <app-recent-activity class="d-block h-100"></app-recent-activity>
        </div>
        <div class="col-xl-4 col-lg-4">
          <app-achievements class="d-block h-100"></app-achievements>
        </div>
        <div class="col-xl-4 col-lg-4">
          <app-support class="d-block h-100"></app-support>
        </div>
      </div>

      <!-- Skills, Favorites -->
      <div class="row mb-4" *ngIf="!notEnrolledInActiveYear">
        <div class="col-xl-8 col-lg-7 mb-3 mb-lg-0">
          <app-skills-overview class="d-block h-100"></app-skills-overview>
        </div>
        <div class="col-xl-4 col-lg-5">
          <app-my-favorites class="d-block h-100"></app-my-favorites>
        </div>
      </div>
      
    </div>
  </div>
</section>
