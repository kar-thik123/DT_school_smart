<button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="nav-notification-icons">
  <i class="material-icons-outlined icon-color">notifications_active</i>
  @if (unreadCount > 0) {
  <span class="notification-badge">{{unreadCount}}</span>
  }
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu">
  <div class="notification-header">
    <h6 class="mb-0">Notifications</h6>
    <a class="notification-mark-as-read" (click)="markAll()">Mark all as read</a>
  </div>
  <div class="notification-dropdown">
    <ng-scrollbar style="height: 350px" visibility="hover">
      <div class="noti-list">
        <div class="menu">
          <div>
            @for (notification of notifications; track notification) {
            <button mat-menu-item onClick="return false;"
              [ngClass]="[!notification.isRead ? 'msg-unread' : 'msg-read', isRemoving(notification) ? 'notification-removing' : '']"
              [@notificationAnimation]="isRemoving(notification) ? 'void' : ''" (click)="markAsRead(notification)">
              <span class="menu-info">
                <div class="notification-content-row">
                  <span class="table-img msg-user">
                    <i class="material-icons-outlined notification-type-icon"
                      [ngClass]="[notification.color]">{{notification.icon === 'plus-circle' ? 'add_circle_outline' : (notification.icon || 'notifications')}}</i>
                  </span>
                  <div>
                    <span class="menu-title"
                      style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; display: block; line-height: 1.3; margin-bottom: 2px;">{{notification.title}}</span>
                    <span class="menu-desc"
                      style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; margin-bottom: 6px; color: #666; font-size: 13px; line-height: 1.3; display: block;">
                      {{notification.message}}
                    </span>
                    <span class="menu-desc">
                      <i class="material-icons">access_time</i> {{notification.created_at | date:'MMM d, yyyy h:mm a'}}
                    </span>
                    @if (notification.type === 'email') {
                    <button mat-stroked-button color="primary" class="notification-action-btn mt-2"
                      (click)="$event.stopPropagation(); onActionClick(notification)">
                      Open
                    </button>
                    }
                    @if (!notification.isRead) {
                    <button mat-stroked-button color="accent" class="notification-action-btn mt-2 ms-2"
                      (click)="$event.stopPropagation(); onMarkAsReadButtonClick(notification)">
                      Mark as read
                    </button>
                    }
                  </div>
                </div>
              </span>
              <span class="notification-close" (click)="$event.stopPropagation(); removeNotification(notification)">
                <app-feather-icons [icon]="'x'" [class]="'user-menu-icons'"></app-feather-icons>
              </span>
            </button>
            }
          </div>
        </div>
      </div>
    </ng-scrollbar>
  </div>
  <div class="notification-footer">
    <a class="notification-read-all" (click)="readAllNotifications()">Read All Notifications</a>
  </div>
</mat-menu>
