<section class="content">
    <div class="content-block">
        @for (breadscrum of breadscrums; track breadscrum) {
        <div class="block-header">
            <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items"
                [active_item]="breadscrum.active"></app-breadcrumb>
        </div>
        }
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <app-master-table [title]="'Weak Subjects Report'" [columnDefinitions]="columnDefinitions"
                    [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'weak_subjects_export'"
                    [showAdd]="false" [showDelete]="false" [showEdit]="false" [showBulkDelete]="false" [showCheckbox]="false"
                    (refresh)="handleRefresh()">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
