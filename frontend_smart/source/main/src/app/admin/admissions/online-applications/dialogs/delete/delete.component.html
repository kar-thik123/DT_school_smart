<div class="container">
  <h3 mat-dialog-title>Delete Record</h3>
  <div mat-dialog-content>
    <p>Are you sure you want to delete application for {{data.student_name}}?</p>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button (click)="confirmDelete()" color="warn">Delete</button>
    <button mat-button (click)="dialogRef.close()" color="primary">Cancel</button>
  </div>
</div>
