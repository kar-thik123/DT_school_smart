<section class="content">
    <div class="content-block">
        @for (breadscrum of breadscrums; track breadscrum) {
        <div class="block-header">
            <!-- breadcrumb -->
            <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
            </app-breadcrumb>
        </div>
        }
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <app-master-table [title]="'Room List'" [columnDefinitions]="columnDefinitions"
                        [dataSource]="dataSource" [isLoading]="isLoading" [showAdd]="true" [showEdit]="true"
                        [showDelete]="true" [showRefresh]="true" [showExport]="true" [showBulkDelete]="true"
                        [exportFileName]="'hostel_room_list'" (add)="addNew()" (edit)="editCall($event)"
                        (delete)="deleteItem($event)" (refresh)="refresh()"
                        (bulkDelete)="handleBulkDelete($event)"></app-master-table>
                </div>
            </div>
        </div>
    </div>
</section>
