<div class="dropdown-container">
  <button class="dropdown-trigger" (click)="toggleDropdown()" [class.active]="isOpen">
    {{ buttonLabel }}
    <mat-icon class="arrow-icon" [class.rotated]="isOpen">keyboard_arrow_down</mat-icon>
  </button>

  <div class="dropdown-panel" *ngIf="isOpen" @dropdownFade>
    <div class="dropdown-content">
      <div class="tree-container">
        <!-- Grades List -->
        <ng-container *ngFor="let grade of items">
          <div class="tree-node grade-node" [class.expanded]="grade.expanded">
            <div class="node-content" (click)="toggleGrade(grade, $event)">
              <mat-icon class="toggle-icon" [class.rotated]="grade.expanded">
                keyboard_arrow_right
              </mat-icon>
              <span class="node-label">{{ grade.name }}</span>
            </div>
            
            <div class="children-container" 
                 [@expandCollapse]="grade.expanded ? 'expanded' : 'collapsed'">
              <div class="tree-line"></div>
              <div class="section-list">
                <div class="tree-node section-node" 
                     *ngFor="let section of grade.sections"
                     (click)="selectSection(grade.id, section.id, $event)">
                  <div class="node-connector">
                    <div class="horizontal-line"></div>
                  </div>
                  <span class="node-label">Section {{ section.name }}</span>
                </div>
                <div class="empty-node" *ngIf="grade.sections?.length === 0">
                  <span class="text-muted">No sections</span>
                </div>
              </div>
            </div>
          </div>
        </ng-container>
        <div class="empty-node p-3 text-center text-muted" *ngIf="items.length === 0">
          No grades available
        </div>
      </div>
    </div>
  </div>
</div>
