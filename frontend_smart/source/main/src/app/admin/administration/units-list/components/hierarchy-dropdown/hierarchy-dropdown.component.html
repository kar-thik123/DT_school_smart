<div class="hierarchy-container">
  <!-- Trigger Button -->
  <button class="hierarchy-trigger" [class.open]="isHierarchyOpen" (click)="toggleDropdown()"
    [attr.aria-expanded]="isHierarchyOpen">
    <div class="trigger-content">
      <!-- <mat-icon class="trigger-icon-left">inventory_2</mat-icon> -->
      <span class="trigger-text" *ngIf="selectedGradeId; else emptyState">
        <span class="label">{{ labelName }}:</span>
        <span class="value">{{ selectedGradeName }} - Section {{ selectedSectionName }}</span>
      </span>
      <ng-template #emptyState>
        <span class="trigger-text empty" style="font-size: medium;">{{ labelName }}</span>
      </ng-template>
    </div>
    <mat-icon class="trigger-icon-right"
      [@iconRotate]="isHierarchyOpen ? 'expanded' : 'collapsed'">chevron_right</mat-icon>
  </button>

  <!-- Dropdown Panel -->
  <div class="hierarchy-panel" *ngIf="isHierarchyOpen" [@dropdownAnimation]>
    <div class="hierarchy-scroll-area" (click)="$event.stopPropagation()">

      <!-- Grade List -->
      <ng-container *ngIf="grades && grades.length > 0; else noGrades">
        <div class="grade-item" *ngFor="let grade of grades">

          <!-- Grade Row -->
          <div class="grade-row" [class.expanded]="expandedGrade === grade.id" (click)="toggleGrade(grade.id, $event)">
            <mat-icon class="grade-chevron"
              [@iconRotate]="expandedGrade === grade.id ? 'expanded' : 'collapsed'">chevron_right</mat-icon>
            <span class="grade-name">{{ grade.name }}</span>
          </div>

          <!-- Sections Wrapper (Collapsible) -->
          <div class="sections-container" [@expandAnimation]="expandedGrade === grade.id ? 'expanded' : 'collapsed'">
            <div class="sections-tree">

              <ng-container *ngIf="getSectionsForGrade(grade.id).length > 0; else noSections">
                <!-- All Sections -->
                <div class="section-row all-sections"
                  [class.active]="selectedGradeId === grade.id && selectedSectionId === 'ALL'"
                  (click)="selectGradeSectionForUnit(grade, 'ALL', $event)">
                  <div class="tree-line"></div>
                  <span class="section-name">All Sections</span>
                </div>

                <!-- Individual Sections -->
                <div class="section-row" *ngFor="let section of getSectionsForGrade(grade.id); let last = last"
                  [class.active]="selectedGradeId === grade.id && selectedSectionId === section.id"
                  (click)="selectGradeSectionForUnit(grade, section, $event)">
                  <div class="tree-line" [class.last]="last"></div>
                  <span class="section-name">{{ section.name }}</span>
                </div>
              </ng-container>

              <ng-template #noSections>
                <div class="section-row empty">
                  <div class="tree-line last"></div>
                  <span class="section-name text-muted">No sections available</span>
                </div>
              </ng-template>

            </div>
          </div>

        </div>
      </ng-container>

      <ng-template #noGrades>
        <div class="empty-state">
          <span class="text-muted">No curriculum data available</span>
        </div>
      </ng-template>

    </div>
  </div>
</div>
