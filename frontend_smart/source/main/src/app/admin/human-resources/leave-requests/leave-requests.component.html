<section class="content">
  <div class="content-block">
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="'Leave Requests'" [items]="['HR']" [active_item]="'Leave Requests'">
      </app-breadcrumb>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [title]="'Leave Requests'" [columnDefinitions]="columnDefinitions" [dataSource]="dataSource"
          [isLoading]="isLoading" [exportFileName]="'leave_requests_export'" [showAdd]="true" [showDelete]="true"
          [showEdit]="true" [showBulkDelete]="true" [showCheckbox]="true" (add)="handleAdd()"
          (edit)="handleEdit($event)" (delete)="handleDelete($event)" (refresh)="handleRefresh()"
          (bulkDelete)="handleBulkDelete($event)" (rowClick)="detailsCall($event)" [disableRowClickToEdit]="true">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
