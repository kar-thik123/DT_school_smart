<style>
.custom-scrollbar::-webkit-scrollbar { width: 5px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f8f9fa; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
</style>
<div class="card bg-white border-0 shadow-sm h-100" style="border-radius: 16px;">
  <div class="card-header bg-transparent border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 40px; height: 40px; background-color: #f3e8ff; color: #a855f7;">
        <i class="fas fa-history font-16"></i>
      </div>
      <div>
        <h6 class="font-weight-bold mb-0 text-dark font-16">Recent Activity</h6>
        <span class="font-12 text-muted fw-bold">Platform Events Feed</span>
      </div>
    </div>
    <a *ngIf="false" href="javascript:void(0)" class="text-primary font-13 fw-bold text-decoration-none">View All</a>
  </div>

  <div class="card-body p-4 pt-4 d-flex flex-column">
    <app-dashboard-widget-wrapper 
      [state]="widgetState" 
      skeletonType="list" 
      emptyMessage="No recent activity found" 
      (retry)="loadData()"
      class="flex-grow-1 d-flex flex-column">
      
      <div class="d-flex flex-column flex-grow-1 gap-4 custom-scrollbar" style="max-height: 280px; overflow-y: auto; padding-right: 8px;">
        
        <div class="d-flex align-items-start" *ngFor="let act of activities">
          <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" 
               style="width: 36px; height: 36px;"
               [ngStyle]="{
                 'background-color': act.type === 'EXAM_RESULT' ? '#eff6ff' : (act.type === 'SYLLABUS_UPDATE' ? '#dcfce7' : (act.type === 'ACADEMIC_YEAR' ? '#fef3c7' : (act.type === 'ATTENDANCE' ? '#e0f2fe' : '#f1f5f9'))),
                 'color': act.type === 'EXAM_RESULT' ? '#3b82f6' : (act.type === 'SYLLABUS_UPDATE' ? '#22c55e' : (act.type === 'ACADEMIC_YEAR' ? '#f59e0b' : (act.type === 'ATTENDANCE' ? '#0ea5e9' : '#64748b')))
               }">
            <i class="fas font-13" [ngClass]="act.type === 'EXAM_RESULT' ? 'fa-file-alt' : (act.type === 'SYLLABUS_UPDATE' ? 'fa-book-open' : (act.type === 'ACADEMIC_YEAR' ? 'fa-calendar' : (act.type === 'ATTENDANCE' ? 'fa-user-check' : 'fa-info-circle')))"></i>
          </div>
          
          <div class="d-flex flex-column flex-grow-1">
            <span class="fw-bold mb-1 text-dark font-14 lh-sm">{{ act.title }}</span>
            <div class="d-flex align-items-center">
              <span class="font-12 text-muted fw-bold me-3">{{ act.actor_name }}</span>
              <span class="font-12 text-muted">{{ act.timestamp | date:'MMM d, h:mm a' }}</span>
            </div>
          </div>
        </div>
        
      </div>
      
    </app-dashboard-widget-wrapper>
  </div>
</div>
