<style>
.custom-scrollbar::-webkit-scrollbar { width: 5px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f8f9fa; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
.score-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 800;
  background-color: #dcfce7;
  color: #22c55e;
}
</style>
<div class="card bg-white border-0 shadow-sm h-100" style="border-radius: 16px;">
  <div class="card-header bg-transparent border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 40px; height: 40px; background-color: #eff6ff; color: #3b82f6;">
        <i class="fas fa-medal font-16"></i>
      </div>
      <div>
        <h6 class="font-weight-bold mb-0 text-dark font-16">Teacher Performance</h6>
        <span class="font-12 text-muted fw-bold">Top 5 by Assessment Average</span>
      </div>
    </div>
    <a *ngIf="false" href="javascript:void(0)" class="text-primary font-13 fw-bold text-decoration-none">View All</a>
  </div>

  <div class="card-body p-4 pt-4 d-flex flex-column">
    <app-dashboard-widget-wrapper 
      [state]="widgetState" 
      skeletonType="list" 
      emptyMessage="No evaluation data found for teachers" 
      (retry)="loadData()"
      class="flex-grow-1 d-flex flex-column">
      
      <div class="d-flex flex-column flex-grow-1 custom-scrollbar" style="max-height: 280px; overflow-y: auto; padding-right: 8px;">
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2">
          <span class="font-10 text-muted fw-bold text-uppercase tracking-wide" style="width: 10%;">Rank</span>
          <span class="font-10 text-muted fw-bold text-uppercase tracking-wide flex-grow-1">Teacher</span>
          <span class="font-10 text-muted fw-bold text-uppercase tracking-wide" style="width: 25%;">Subject</span>
          <span class="font-10 text-muted fw-bold text-uppercase tracking-wide text-end" style="width: 15%;">Score</span>
        </div>
        
        <div *ngFor="let t of teachers | slice:0:5; let i = index" class="d-flex justify-content-between align-items-center mb-3">
          <div class="font-14 text-center" style="width: 10%;">
            <ng-container *ngIf="i === 0">🥇</ng-container>
            <ng-container *ngIf="i === 1">🥈</ng-container>
            <ng-container *ngIf="i === 2">🥉</ng-container>
            <span *ngIf="i > 2" class="fw-bold text-muted">{{ i + 1 }}</span>
          </div>
          
          <div class="d-flex align-items-center flex-grow-1">
            <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-3 flex-shrink-0 font-12 fw-bold text-muted" style="width: 32px; height: 32px;">
              {{ t.teacher_name.charAt(0) }}
            </div>
            <span class="fw-bold text-dark font-13 text-truncate" style="max-width: 130px;" [title]="t.teacher_name">{{ t.teacher_name }}</span>
          </div>
          
          <div style="width: 25%;">
            <span class="font-13 fw-bold text-muted text-truncate d-inline-block" style="max-width: 80px;" [title]="t.subject">{{ t.subject }}</span>
          </div>
          
          <div class="text-end" style="width: 15%;">
            <span class="score-badge">{{ t.average_score }}%</span>
          </div>
        </div>
      </div>
      
    </app-dashboard-widget-wrapper>
  </div>
</div>
