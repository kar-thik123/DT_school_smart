<style>
.severity-badge {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: capitalize;
  letter-spacing: 0.2px;
}
.severity-high { background-color: #fee2e2; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
.severity-med { background-color: #fef3c7; color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
.severity-low { background-color: #dcfce7; color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
.custom-scrollbar::-webkit-scrollbar { width: 5px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f8f9fa; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
</style>
<div class="card bg-white border-0 shadow-sm h-100" style="border-radius: 16px;">
  <div class="card-header bg-transparent border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 40px; height: 40px; background-color: #fee2e2; color: #ef4444;">
        <i class="fas fa-exclamation-triangle font-16"></i>
      </div>
      <div>
        <h6 class="font-weight-bold mb-0 text-dark font-16">Weak Subjects</h6>
        <span class="font-12 text-muted fw-bold">Top 5 by Average Score</span>
      </div>
    </div>
    <a [routerLink]="['/admin/reports/exam-reports']" [queryParams]="{ filter: 'weak_subjects' }" class="text-primary font-13 fw-bold text-decoration-none">View All</a>
  </div>

  <div class="card-body p-4 pt-4 d-flex flex-column">
    <app-dashboard-widget-wrapper 
      [state]="widgetState" 
      skeletonType="list" 
      emptyMessage="No exam records found to analyze" 
      (retry)="loadData()"
      class="flex-grow-1 d-flex flex-column">
      
      <div class="d-flex flex-column flex-grow-1 gap-4 custom-scrollbar" style="max-height: 280px; overflow-y: auto; padding-right: 8px;">
        <div class="d-flex justify-content-between align-items-center" *ngFor="let ws of weakSubjects | slice:0:5">
          
          <div class="d-flex flex-column" style="width: 55%;">
            <span class="fw-bold text-dark font-14 mb-2">{{ ws.subject }}</span>
            <div class="progress" style="height: 4px; border-radius: 2px; background: #f1f5f9;">
              <div class="progress-bar" 
                   [ngClass]="ws.average_score < 40 ? 'bg-danger' : (ws.average_score < 60 ? 'bg-warning' : 'bg-success')"
                   role="progressbar" 
                   [style.width.%]="ws.average_score" 
                   [attr.aria-valuenow]="ws.average_score" 
                   aria-valuemin="0" 
                   aria-valuemax="100"></div>
            </div>
          </div>
          
          <div class="d-flex align-items-center gap-3">
            <span class="fw-bold text-dark font-13" style="width: 35px; text-align: right;">{{ ws.average_score }}%</span>
            <span class="severity-badge text-center" style="width: 60px;" [ngClass]="ws.average_score < 40 ? 'severity-high' : (ws.average_score < 60 ? 'severity-med' : 'severity-low')">
              {{ ws.average_score < 40 ? 'High' : (ws.average_score < 60 ? 'Medium' : 'Low') }}
            </span>
          </div>

        </div>
      </div>
      
    </app-dashboard-widget-wrapper>
  </div>
</div>
