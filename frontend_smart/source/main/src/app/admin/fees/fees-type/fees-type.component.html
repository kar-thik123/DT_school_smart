<section class="content">
    <div class="content-block">
        @for (breadscrum of breadscrums; track breadscrum) {
        <div class="block-header">
            <!-- breadcrumb -->
            <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
            </app-breadcrumb>
        </div>
        }
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <app-master-table [title]="'Fees Type'" [dataSource]="dataSource"
                        [columnDefinitions]="columnDefinitions" [isLoading]="isLoading" (add)="handleAdd()"
                        (edit)="handleEdit($event)" (delete)="handleDelete($event)" (refresh)="handleRefresh()"
                        (bulkDelete)="handleBulkDelete($event)" [showExport]="true" [showContextMenu]="true">
                    </app-master-table>
                </div>
            </div>
        </div>
    </div>
</section>
