<div class="container">
  <h3 mat-dialog-title>Confirm Delete</h3>
  <div mat-dialog-content>
    <p>Are you sure you want to delete this record ({{data.book_title}})?</p>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button (click)="confirmDelete()" color="warn">Delete</button>
    <button mat-button mat-dialog-close>Cancel</button>
  </div>
</div>
