<section class="content">
    <div class="content-block">
        @for (breadscrum of breadscrums; track breadscrum) {
        <div class="block-header">
            <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
            </app-breadcrumb>
        </div>
        }

        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                <mat-card class="card-box">
                    <div class="header d-flex justify-content-between align-items-center">
                        <h2><strong>Manage</strong> Notifications</h2>
                        <button mat-raised-button color="primary" (click)="saveSettings()">
                            <mat-icon>save</mat-icon> Save Changes
                        </button>
                    </div>
                    <div class="body">
                        @for (group of notificationGroups; track group.category) {
                        <div class="notification-group mb-5">
                            <div class="group-title d-flex align-items-center mb-3">
                                <mat-icon class="me-2 text-primary">{{group.icon}}</mat-icon>
                                <h4 class="mb-0">{{group.category}}</h4>
                            </div>
                            <mat-divider class="mb-3"></mat-divider>

                            <div class="settings-list">
                                @for (setting of group.settings; track setting.id) {
                                <div class="setting-item d-flex align-items-center py-3 border-bottom">
                                    <div class="setting-info flex-grow-1">
                                        <h5 class="mb-1 font-weight-bold">{{setting.label}}</h5>
                                        <p class="text-muted mb-0 small">{{setting.description}}</p>
                                    </div>
                                    <div class="channels-toggles d-flex gap-4">
                                        <div class="toggle-box text-center">
                                            <small class="d-block mb-1 text-muted">Email</small>
                                            <mat-slide-toggle color="primary"
                                                [(ngModel)]="setting.email"></mat-slide-toggle>
                                        </div>
                                        <div class="toggle-box text-center">
                                            <small class="d-block mb-1 text-muted">SMS</small>
                                            <mat-slide-toggle color="accent"
                                                [(ngModel)]="setting.sms"></mat-slide-toggle>
                                        </div>
                                        <div class="toggle-box text-center">
                                            <small class="d-block mb-1 text-muted">Internal</small>
                                            <mat-slide-toggle [(ngModel)]="setting.internal"></mat-slide-toggle>
                                        </div>
                                    </div>
                                </div>
                                }
                            </div>
                        </div>
                        }
                    </div>
                </mat-card>
            </div>
        </div>
    </div>
</section>
