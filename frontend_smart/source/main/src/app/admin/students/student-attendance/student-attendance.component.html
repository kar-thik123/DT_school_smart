<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
      </app-breadcrumb>
    </div>
    }
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [title]="'Student Attendance'" [columnDefinitions]="columnDefinitions"
          [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'attendance_export'" [showAdd]="hasManagePermission"
          [showDelete]="hasManagePermission" [showEdit]="hasManagePermission" [showBulkDelete]="hasManagePermission" [showCheckbox]="hasManagePermission" (add)="handleAdd()"
          (edit)="handleEdit($event)" (delete)="handleDelete($event)" (refresh)="handleRefresh()"
          (bulkDelete)="handleBulkDelete($event)">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
