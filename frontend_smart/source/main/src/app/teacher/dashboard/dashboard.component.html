<section class="content">
  <div class="content-block px-md-3 py-3">
    <div class="d-flex justify-content-between align-items-center flex-nowrap header-responsive-wrapper gap-2 mb-3">
      <div class="block-header m-0 responsive-breadcrumb" style="min-width: 0; flex: 1 1 auto;">
        <div *ngFor="let breadscrum of breadscrums">
          <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items"
            [active_item]="breadscrum.active"></app-breadcrumb>
        </div>
      </div>

      <div class="d-flex align-items-center gap-3 header-actions-wrapper" style="flex-shrink: 0;"
        *ngIf="assignments.length > 0 && !loading && !error">

        <div class="hierarchy-dropdown-wrapper">
          <app-hierarchy-dropdown [grades]="grades" [allSections]="allSections" [selectedGradeId]="selectedGradeId"
            [selectedSectionId]="selectedClassId" [selectedGradeName]="selectedGradeName"
            [selectedSectionName]="selectedClassName" labelName="Class" (selectionChange)="onHierarchyChange($event)">
          </app-hierarchy-dropdown>
        </div>

        <div class="hierarchy-dropdown-wrapper subject-dropdown-wrapper"
          style="position: relative; display: inline-block;">
          <button class="hierarchy-trigger" (click)="isSubjectOpen = !isSubjectOpen" [class.open]="isSubjectOpen">
            <div class="trigger-content">
              <span class="trigger-text">
                <span class="label">Subject:</span>
                <span class="value">{{ selectedSubjectName }}</span>
              </span>
            </div>
            <mat-icon class="trigger-icon-right"
              [style.transform]="isSubjectOpen ? 'rotate(90deg)' : 'rotate(0deg)'">chevron_right</mat-icon>
          </button>

          <div class="hierarchy-panel" *ngIf="isSubjectOpen"
            style="position: absolute; top: calc(100% + 6px); right: 0; min-width: 200px; z-index: 1000; padding: 8px 0; border-radius: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; border: 1px solid #e5e7eb;">
            <div class="hierarchy-scroll-area" style="max-height: 300px; overflow-y: auto;">
              <div class="grade-row dropdown-item-row" [class.active]="selectedSubjectId === ''"
                (click)="selectedSubjectId = ''; onSubjectChange(); isSubjectOpen = false;">
                <span class="grade-name">All Subjects</span>
              </div>
              <div class="grade-row dropdown-item-row" *ngFor="let sub of availableSubjects"
                [class.active]="selectedSubjectId === sub.id"
                (click)="selectedSubjectId = sub.id; onSubjectChange(); isSubjectOpen = false;">
                <span class="grade-name">{{ sub.name }}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="hierarchy-dropdown-wrapper year-dropdown-wrapper"
          style="position: relative; display: inline-block;">
          <button class="hierarchy-trigger" (click)="isYearOpen = !isYearOpen" [class.open]="isYearOpen">
            <div class="trigger-content">
              <span class="trigger-text">
                <span class="label">Year:</span>
                <span class="value">{{ academicYearName || 'Select Year' }}</span>
              </span>
            </div>
            <mat-icon class="trigger-icon-right"
              [style.transform]="isYearOpen ? 'rotate(90deg)' : 'rotate(0deg)'">chevron_right</mat-icon>
          </button>

          <div class="hierarchy-panel" *ngIf="isYearOpen"
            style="position: absolute; top: calc(100% + 6px); right: 0; min-width: 200px; z-index: 1000; padding: 8px 0; border-radius: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; border: 1px solid #e5e7eb;">
            <div class="hierarchy-scroll-area" style="max-height: 300px; overflow-y: auto;">
              <div class="grade-row dropdown-item-row" *ngFor="let year of academicYears"
                [class.active]="selectedAcademicYearId === year.id" (click)="onYearChange(year); isYearOpen = false;">
                <span class="grade-name">{{ year.academicYear || year.name }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="error && !loading" class="alert alert-danger" role="alert">
      {{ error }}
      <button class="btn btn-outline-danger ms-3" (click)="loadAssignments()">Retry</button>
    </div>

    <div *ngIf="!error" class="dashboard-container">
      <div *ngIf="!loading && assignments.length === 0" class="text-muted font-12 mb-3">No classes assigned.</div>

      <!-- Each widget loads its own data independently -->
      <ng-container *ngIf="loading || selectedAssignment">

        <!-- Hero Banner Widget -->
        <div class="row mb-3">
          <div class="col-12">
            <app-teacher-hero-banner></app-teacher-hero-banner>
          </div>
        </div>

        <!-- Overview KPI Cards Widget -->
        <app-teacher-overview-metrics [selectedSubjectName]="selectedSubjectName"></app-teacher-overview-metrics>

        <!-- Administrative KPIs Widget -->
        <app-teacher-admin-kpis [selectedSubjectId]="selectedSubjectId"></app-teacher-admin-kpis>

        <!-- Curriculum Progress KPIs Widget (visible when subject selected) -->
        <app-teacher-syllabus-coverage></app-teacher-syllabus-coverage>

        <!-- Main Content Row 1: Performance Trend and Attendance -->
        <div class="row g-3 mb-4">
          <div class="col-xl-8 col-lg-7">
            <app-teacher-performance-trend></app-teacher-performance-trend>
          </div>
          <div class="col-xl-4 col-lg-5">
            <app-teacher-attendance-widget></app-teacher-attendance-widget>
          </div>
        </div>

        <!-- Main Content Row 2: Recent Assessments and Topic Mastery -->
        <div class="row g-3 mb-4">
          <div class="col-xl-8 col-lg-7">
            <app-teacher-recent-assessments></app-teacher-recent-assessments>
          </div>
          <div class="col-xl-4 col-lg-5">
            <app-teacher-topic-mastery [selectedSubjectId]="selectedSubjectId"></app-teacher-topic-mastery>
          </div>
        </div>

        <!-- Main Content Row 3: Weak Students and Top Performers -->
        <div class="row g-3 mb-4">
          <div class="col-xl-4 col-lg-4">
            <app-teacher-weak-students></app-teacher-weak-students>
          </div>
          <div class="col-xl-4 col-lg-4">
            <app-teacher-top-performers></app-teacher-top-performers>
          </div>
        </div>

      </ng-container>
    </div>
  </div>
</section>
