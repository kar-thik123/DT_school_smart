<app-dashboard-widget-wrapper [state]="state" skeletonType="chart" emptyMessage="Not enough data to display trend" (retry)="loadData(contextService.currentContext?.sectionId!, contextService.currentContext?.subjectId)">
  <div class="card bg-body border-0 shadow-sm h-100" style="border-radius: 20px;">
    <div class="card-header bg-transparent border-0 p-3 p-xl-4 pb-0 d-flex align-items-center">
      <div
        class="rounded-circle bg-light-success text-success d-flex align-items-center justify-content-center me-2"
        style="width: 24px; height: 24px;">
        <i class="fas fa-chart-line font-10"></i>
      </div>
      <h6 class="font-weight-bold mb-0 text-body font-14">Performance Trend</h6>
    </div>
    <div class="card-body p-3 p-xl-4 pt-2">
      <div *ngIf="performanceTrend.length === 0" class="text-center p-3 bg-body-secondary rounded-3">
        <span class="font-11 text-muted">Not enough data to display trend.</span>
      </div>
      <div *ngIf="performanceTrend.length > 0" class="w-100"
        style="height: 250px; overflow: hidden; margin: 0 -10px;">
        <apx-chart *ngIf="chartOptions?.series" [series]="chartOptions.series!"
          [chart]="chartOptions.chart!" [xaxis]="chartOptions.xaxis!"
          [colors]="chartOptions.colors!" [stroke]="chartOptions.stroke!"
          [dataLabels]="chartOptions.dataLabels!" [yaxis]="chartOptions.yaxis!"
          [grid]="chartOptions.grid!">
        </apx-chart>
      </div>
    </div>
  </div>
</app-dashboard-widget-wrapper>
