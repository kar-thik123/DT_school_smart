<app-dashboard-widget-wrapper [state]="state" skeletonType="banner" skeletonHeight="160px" emptyMessage="No class data"
  (retry)="loadData(contextService.currentContext?.sectionId!, contextService.currentContext?.subjectId)">
  <div class="card border-0 shadow-sm position-relative overflow-hidden"
    style="border-radius: 20px; background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 35%, #3b82f6 70%, #60a5fa 100%);">

    <div class="position-absolute rounded-circle"
      style="width: 350px; height: 350px; background: rgba(255,255,255,0.06); top: -150px; left: -50px; z-index: 0; pointer-events: none;">
    </div>
    <div class="position-absolute rounded-circle"
      style="width: 250px; height: 250px; background: rgba(255,255,255,0.08); bottom: -100px; right: 20%; z-index: 0; pointer-events: none;">
    </div>
    <div class="position-absolute rounded-circle"
      style="width: 150px; height: 150px; background: rgba(255,255,255,0.04); bottom: 50px; right: 5%; z-index: 0; pointer-events: none;">
    </div>

    <div
      class="card-body p-3 p-lg-4 d-flex flex-column flex-lg-row align-items-center justify-content-between position-relative z-index-1 gap-4">

      <!-- Welcome Content (Left) -->
      <div class="d-flex flex-column text-white flex-grow-1" style="flex: 1; z-index: 2;">
        <h2 class="mb-2 fw-bold" style="font-size: clamp(1.6rem, 2vw, 2.2rem); letter-spacing: -0.5px;">
          👋 Welcome, Teacher {{ teacherName.split(' ')[0] }}
        </h2>
        <p class="mb-0"
          style="color: rgba(255,255,255,.9); font-size: clamp(0.9rem, 1.1vw, 1rem); line-height: 1.5; max-width: 500px;">
          Currently viewing performance for <strong class="text-white fw-bold">{{ gradeName }} - {{ sectionName
            }}</strong>.
          <br>The class average score is <strong class="text-white fw-bold">{{ (overview?.avgScore || 0) |
            number:'1.0-1' }}%</strong>.
        </p>
      </div>

    </div>
  </div>
</app-dashboard-widget-wrapper>
