<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb title="My Classes" [items]="['Home']" active_item="My Classes">
      </app-breadcrumb>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [title]="'My Classes'" [columnDefinitions]="columnDefinitions" [dataSource]="dataSource"
          [isLoading]="isLoading" [exportFileName]="'my_classes_export'" [showAdd]="false" [showDelete]="true"
          [showEdit]="false" [showBulkDelete]="true" [showCheckbox]="true" (add)="handleAdd()"
          (edit)="handleEdit($event)" (delete)="handleDelete($event)" (refresh)="handleRefresh()"
          (bulkDelete)="handleBulkDelete($event)">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
