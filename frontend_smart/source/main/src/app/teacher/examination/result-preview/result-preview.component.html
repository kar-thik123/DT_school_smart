<section class="content">
    <div class="content-block">
        @for (breadscrum of breadscrums; track breadscrum) {
        <div class="block-header">
            <!-- breadcrumb -->
            <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
            </app-breadcrumb>
        </div>
        }
        <div class="row clearfix">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                <div class="card">
                    <div class="header">
                        <h2>Preview Student Results</h2>
                    </div>
                    <div class="body">
                        <form class="m-4" [formGroup]="previewForm" (ngSubmit)="onPreview()">
                            <div class="row">
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Student Name</mat-label>
                                        <input matInput formControlName="studentName" required>
                                        <mat-icon class="material-icons-outlined color-icon p-3"
                                            matSuffix>person</mat-icon>
                                    </mat-form-field>
                                </div>
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Roll No</mat-label>
                                        <input matInput formControlName="rollNo" required>
                                        <mat-icon class="material-icons-outlined color-icon p-3"
                                            matSuffix>badge</mat-icon>
                                    </mat-form-field>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Class</mat-label>
                                        <mat-select formControlName="class" required>
                                            <mat-option value="10A">10A</mat-option>
                                            <mat-option value="11B">11B</mat-option>
                                            <mat-option value="12C">12C</mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                </div>
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Exam Type</mat-label>
                                        <mat-select formControlName="examType" required>
                                            <mat-option value="midterm">Midterm</mat-option>
                                            <mat-option value="final">Final Exam</mat-option>
                                            <mat-option value="unit_test">Unit Test</mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                    <button class="btn-space" [disabled]="!previewForm.valid" mat-flat-button
                                        color="primary">Preview Results</button>
                                    <button type="button" mat-flat-button class="formCancelBtn">Reset</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
