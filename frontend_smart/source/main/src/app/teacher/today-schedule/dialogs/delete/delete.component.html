<div class="container">
    <h3 mat-dialog-title>Are you sure?</h3>
    <div mat-dialog-content>
        <p>Are you sure you want to delete this schedule: <strong>{{data.subject}}</strong>?</p>
    </div>
    <div mat-dialog-actions class="mb-1">
        <button mat-flat-button class="formCancelBtn" (click)="confirmDelete()">
            Delete
        </button>
        <button mat-flat-button mat-dialog-close color="accent" tabindex="-1">Cancel</button>
    </div>
</div>
